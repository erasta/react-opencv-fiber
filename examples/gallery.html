<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>@react-opencv/fiber — Examples</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; height: 100vh; background: #0d0a12; color: #d0c8e0; font-family: system-ui, sans-serif; }
    nav { width: 220px; padding: 16px; border-right: 1px solid #2a2040; display: flex; flex-direction: column; gap: 4px; overflow-y: auto; }
    nav a { display: block; padding: 8px 12px; border-radius: 6px; color: #a098b8; text-decoration: none; font-size: 14px; cursor: pointer; }
    nav a:hover { background: #1a1525; color: #d0c8e0; }
    nav a.active { background: #2a2040; color: #e0d8f0; }
    iframe { flex: 1; border: none; background: #0d0a12; }
  </style>
</head>
<body>
  <nav id="nav"></nav>
  <iframe id="frame"></iframe>
  <script>
    const examples = [
      "adaptive-threshold-blur",
      "canny-gaussian",
      "colormap-blur",
      "edge-preserving-canny",
      "laplacian-blur",
      "meanshift-scharr",
      "median-equalize",
      "sobel-colormap",
      "stylization-detail",
      "threshold-bilateral",
    ];
    const nav = document.getElementById("nav");
    const frame = document.getElementById("frame");

    examples.forEach((name) => {
      const a = document.createElement("a");
      a.textContent = name;
      a.onclick = () => {
        nav.querySelectorAll("a").forEach(el => el.classList.remove("active"));
        a.classList.add("active");
        frame.src = `${name}/dist/index.html`;
      };
      nav.appendChild(a);
    });

    nav.children[0].click();
  </script>
</body>
</html>
